<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン｜ミツクル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="new_styles.css">
</head>
<body>
<div style="font-family: 'Noto Sans JP', sans-serif; color: #2B2B2B; background: #ffffff; line-height: 1.8; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh;">

  <!-- ============ HEADER（グローバルナビ・継承）============ -->
  <header style="position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.88); backdrop-filter: blur(10px); border-bottom: 1px solid #E5E7EB;">
    <div style="max-width: 1180px; margin: 0 auto; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; gap: 28px;">
      <a href="index.html" style="display: flex; align-items: center; text-decoration: none; flex: none;">
        <img src="assets/logo.png" alt="ミツクル — 見積りと制作依頼をワンストップで" style="height: 48px; width: auto; display: block;">
      </a>
      <nav class="gnav-desktop" style="display: flex; align-items: center; gap: 32px; font-size: 15px; font-weight: 500;">
        <a href="about.html" style="color: #2B2B2B; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">ミツクルとは</a>
        <a href="cases.html" style="color: #2B2B2B; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">事例</a>
        <a href="partners.html" style="color: #2B2B2B; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">パートナー紹介</a>
        <a href="videos.html" style="color: #2B2B2B; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">動画</a>
        <a href="index.html#faq" style="color: #2B2B2B; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">よくある質問</a>
      </nav>
      <div class="gnav-actions" style="display: flex; align-items: center; gap: 20px; flex: none;">
        <a href="login.html" style="font-size: 14.5px; font-weight: 700; color: #5F9233; text-decoration: none;">ログイン</a>
        <a href="hearing.html" style="font-size: 15px; font-weight: 700; color: #ffffff; background: #7CB342; padding: 12px 26px; border-radius: 9999px; text-decoration: none; box-shadow: 0 4px 14px rgba(124,179,66,0.35); transition: background .18s ease;" style-hover="background: #689A38;">無料で始める</a>
      </div>
      <button type="button" aria-label="メニューを開く" aria-expanded="false" class="gnav-burger" style="display: none; flex: none; width: 44px; height: 44px; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; padding: 0;">
        <span style="position: relative; display: block; width: 24px; height: 18px;">
          <span style="position: absolute; left: 0; top: 0px; width: 24px; height: 2.5px; border-radius: 2px; background: #2B2B2B; transition: transform .25s ease, top .25s ease, opacity .2s ease; transform: rotate(0deg);"></span>
          <span style="position: absolute; left: 0; top: 8px; width: 24px; height: 2.5px; border-radius: 2px; background: #2B2B2B; transition: opacity .2s ease; opacity: 1;"></span>
          <span style="position: absolute; left: 0; top: 16px; width: 24px; height: 2.5px; border-radius: 2px; background: #2B2B2B; transition: transform .25s ease, top .25s ease; transform: rotate(0deg);"></span>
        </span>
      </button>
    </div>
    <div class="gnav-mobile" style="display: none; border-top: 1px solid #E5E7EB; background: #ffffff;">
      <nav style="max-width: 1180px; margin: 0 auto; padding: 12px 24px 24px; display: flex; flex-direction: column;">
        <a href="about.html" style="font-size: 16px; font-weight: 600; color: #2B2B2B; text-decoration: none; padding: 15px 6px; border-bottom: 1px solid #F0F2EC; transition: color .18s ease;" style-hover="color: #7CB342;">ミツクルとは</a>
        <a href="cases.html" style="font-size: 16px; font-weight: 600; color: #2B2B2B; text-decoration: none; padding: 15px 6px; border-bottom: 1px solid #F0F2EC; transition: color .18s ease;" style-hover="color: #7CB342;">事例</a>
        <a href="partners.html" style="font-size: 16px; font-weight: 600; color: #2B2B2B; text-decoration: none; padding: 15px 6px; border-bottom: 1px solid #F0F2EC; transition: color .18s ease;" style-hover="color: #7CB342;">パートナー紹介</a>
        <a href="videos.html" style="font-size: 16px; font-weight: 600; color: #2B2B2B; text-decoration: none; padding: 15px 6px; border-bottom: 1px solid #F0F2EC; transition: color .18s ease;" style-hover="color: #7CB342;">動画</a>
        <a href="index.html#faq" style="font-size: 16px; font-weight: 600; color: #2B2B2B; text-decoration: none; padding: 15px 6px; border-bottom: 1px solid #F0F2EC; transition: color .18s ease;" style-hover="color: #7CB342;">よくある質問</a>
        <a href="login.html" style="font-size: 16px; font-weight: 700; color: #5F9233; text-decoration: none; padding: 15px 6px; transition: color .18s ease;">ログイン</a>
        <a href="hearing.html" style="margin-top: 14px; text-align: center; font-size: 16px; font-weight: 700; color: #ffffff; background: #7CB342; padding: 15px 26px; border-radius: 9999px; text-decoration: none; box-shadow: 0 4px 14px rgba(124,179,66,0.35);" style-hover="background: #689A38;">無料で始める</a>
      </nav>
    </div>
  </header>

  <!-- ============ ログイン本体 ============ -->
  <main style="flex: 1; position: relative; overflow: hidden; background: #EFF6E4; display: flex; align-items: center; justify-content: center; padding: 80px 24px;">
    <div style="position: absolute; top: -100px; right: -60px; width: 320px; height: 320px; border-radius: 50%; background: rgba(124,179,66,0.10); pointer-events: none;"></div>
    <div style="position: absolute; bottom: -120px; left: -50px; width: 260px; height: 260px; border-radius: 50%; background: rgba(124,179,66,0.08); pointer-events: none;"></div>
    <div style="position: absolute; top: 60px; left: 120px; width: 120px; height: 120px; border-radius: 50%; border: 1.5px solid rgba(124,179,66,0.16); pointer-events: none;"></div>

    <div style="position: relative; z-index: 1; width: 100%; max-width: 420px;">
      <form action="mypage.html" method="get" style="background: #ffffff; border-radius: 22px; padding: 44px 40px; box-shadow: 0 18px 50px rgba(104,154,56,0.16);">

        <div style="display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 30px;">
          <img src="assets/logo.png" alt="ミツクル" style="height: 38px; width: auto; display: block; margin-bottom: 22px;">
          <h1 style="font-size: 22px; font-weight: 900; margin: 0;">マイページにログイン</h1>
        </div>

        <!-- メール -->
        <div style="margin-bottom: 20px;">
          <label style="display: block; font-size: 13.5px; font-weight: 700; color: #2B2B2B; margin-bottom: 8px;">メールアドレス</label>
          <input class="ff-input" type="email" placeholder="example@mitsukuru.jp" autocomplete="username">
        </div>

        <!-- パスワード -->
        <div style="margin-bottom: 18px;">
          <label style="display: block; font-size: 13.5px; font-weight: 700; color: #2B2B2B; margin-bottom: 8px;">パスワード</label>
          <div style="position: relative;">
            <input class="ff-input" type="password" placeholder="••••••••" autocomplete="current-password" style="padding-right: 64px;">
            <button type="button" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-family: inherit; font-size: 12.5px; font-weight: 700; color: #5F9233; background: #EFF6E4; border: none; border-radius: 6px; padding: 6px 11px; cursor: pointer; transition: background .15s ease;" style-hover="background: #E2EFCD;">表示</button>
          </div>
        </div>

        <!-- 保持 -->
        <label style="display: flex; align-items: center; gap: 9px; font-size: 14px; color: #374151; cursor: pointer; margin-bottom: 26px;">
          <input type="checkbox" style="accent-color: #7CB342; width: 17px; height: 17px;">
          ログイン状態を保持する
        </label>

        <!-- ログインボタン -->
        <a href="mypage.html" style="width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: #7CB342; color: #ffffff; font-family: inherit; font-size: 16px; font-weight: 800; border: none; cursor: pointer; padding: 16px 32px; border-radius: 9999px; box-shadow: 0 10px 26px rgba(124,179,66,0.34); text-decoration: none; transition: background .2s ease, transform .2s ease, box-shadow .2s ease;" style-hover="background: #689A38; transform: translateY(-2px); box-shadow: 0 16px 36px rgba(124,179,66,0.40);">
          ログイン
        </a>

        <!-- パスワード再発行 -->
        <div style="text-align: center; margin-top: 20px;">
          <a href="#" style="font-size: 13px; font-weight: 600; color: #5F9233; text-decoration: none;" style-hover="text-decoration: underline;">パスワードをお忘れですか？</a>
        </div>

        <!-- 区切り + 新規 -->
        <div style="border-top: 1px solid #F0F2EC; margin-top: 28px; padding-top: 24px; text-align: center; font-size: 14px; color: #6B7280;">
          アカウントをお持ちでない方は <a href="hearing.html" style="font-weight: 700; color: #5F9233; text-decoration: none; border-bottom: 1.5px solid #C9E3A6;" style-hover="border-color: #7CB342;">無料で始める</a>
        </div>

      </form>
    </div>
  </main>

  <!-- ============ FOOTER（継承）============ -->
  <footer style="background: #ffffff; border-top: 1px solid #E5E7EB;">
    <div style="max-width: 1180px; margin: 0 auto; padding: 72px 32px 40px;">
      <div class="footer-grid">
        <div style="max-width: 360px;">
          <img src="assets/logo.png" alt="ミツクル" style="height: 40px; width: auto; display: block; margin-bottom: 20px;">
          <p style="font-size: 14px; color: #6B7280; line-height: 1.9; margin: 0;">曖昧な要望から、最適なWeb制作パートナーを見つけるヒアリング型マッチングサービス。</p>
        </div>
        <div class="footer-links">
          <div>
            <div style="font-size: 13px; font-weight: 800; letter-spacing: 0.06em; color: #2B2B2B; margin-bottom: 18px;">サービス</div>
            <ul style="list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 13px;">
              <li><a href="about.html" style="font-size: 14px; color: #6B7280; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">ミツクルとは</a></li>
              <li><a href="cases.html" style="font-size: 14px; color: #6B7280; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">事例</a></li>
              <li><a href="partners.html" style="font-size: 14px; color: #6B7280; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">パートナー紹介</a></li>
              <li><a href="videos.html" style="font-size: 14px; color: #6B7280; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">動画</a></li>
              <li><a href="index.html#faq" style="font-size: 14px; color: #6B7280; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">よくある質問</a></li>
            </ul>
          </div>
          <div>
            <div style="font-size: 13px; font-weight: 800; letter-spacing: 0.06em; color: #2B2B2B; margin-bottom: 18px;">会社</div>
            <ul style="list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 13px;">
              <li><a href="#" style="font-size: 14px; color: #6B7280; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">お問い合わせ</a></li>
              <li><a href="#" style="font-size: 14px; color: #6B7280; text-decoration: none; transition: color .18s ease;" style-hover="color: #7CB342;">プライバシーポリシー</a></li>
            </ul>
          </div>
        </div>
      </div>
      <div style="border-top: 1px solid #F0F2EC; margin-top: 48px; padding-top: 28px; font-size: 12.5px; color: #9CA3AF;">© 2026 ミツクル</div>
    </div>
  </footer>

</div>
<script src="script.js"></script>
</body>
</html>
